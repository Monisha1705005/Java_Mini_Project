<!DOCTYPE html> 
<html>
<head>
    <title>DRP Home</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CARD */
.container {
    background: white;
    width: 420px;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 10px;
    color: #333;
}

p {
    color: #666;
    margin-bottom: 25px;
}

/* BUTTONS */
a {
    display: block;
    margin: 12px 0;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
}

.login {
    background: #4CAF50;
    color: white;
}

.register {
    background: #2196F3;
    color: white;
}

a:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>

</head>

<body>

<div class="container">
    <h1>Deadline Risk Prediction</h1>
    <p>Track tasks, monitor progress, and avoid missed deadlines.</p>

    <a href="login.html" class="login">Login</a>
    <a href="register.html" class="register">Register</a>
</div>

</body>
</html>
