<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.box {
    background: white;
    width: 350px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.25);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #5b86e5;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #5b86e5;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #3f6ad8;
}

/* LINK */
.link {
    text-align: center;
    margin-top: 15px;
}

.link a {
    text-decoration: none;
    color: #333;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form action="LoginServlet" method="post">

    <input type="text" name="username" placeholder="Enter Username" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>

</form>

<div class="link">
    <a href="register.html">Create new account</a>
</div>

</div>

</body>
</html>
