<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

<style>
body {
    font-family: 'Segoe UI';
    background: #f5f7fa;
}

.box {
    width: 300px;
    margin: 120px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #388E3C;
}
</style>

</head>

<body>

<div class="box">
<h2>Register</h2>

<form action="RegisterServlet" method="post">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
</form>

</div>

</body>
</html>
